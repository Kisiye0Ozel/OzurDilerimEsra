<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beni Affet Lütfen... 🥺</title>
    <style>
        :root {
            --ana-pembe: #ff4d6d;
            --acik-pembe: #fff0f3;
            --cerceve-rengi: #ffccd5;
            --text-rengi: #d63384;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--acik-pembe);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Arka plan kalpleri - En arkada kalması için z-index: -1 */
        #heartBg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.3);
            font-size: 24px;
            animation: ucma 5s linear forwards;
        }

        @keyframes ucma {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Ana Kart */
        .container {
            background: white;
            padding: 35px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.15);
            text-align: center;
            border: 5px solid var(--cerceve-rengi);
            width: 90%;
            max-width: 360px;
            position: relative;
            z-index: 100; /* Her zaman önde */
            animation: gelis 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gelis {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Üstteki İsim Başlığı */
        .header-name {
            color: var(--ana-pembe);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .character-box img {
            width: 150px;
            margin-bottom: 15px;
            filter: drop-shadow(0 8px 15px rgba(255, 77, 109, 0.2));
            animation: nefes 3s ease-in-out infinite;
        }

        @keyframes nefes {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .dialog-box {
            background: #fff5f7;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 25px;
            color: var(--text-rengi);
            font-weight: 600;
            font-size: 1.05rem;
            border: 2px dashed var(--cerceve-rengi);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 60px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #acceptBtn {
            background: var(--ana-pembe);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #declineBtn {
            background: #f1f3f5;
            color: #495057;
            position: relative;
            z-index: 101;
        }

        /* Başarı Ekranı */
        #successScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="heartBg"></div>

    <div id="successScreen">
        <div style="font-size: 80px;">💖</div>
        <h1 id="finalTitle" style="color: var(--ana-pembe);"></h1>
        <p id="finalMsg" style="font-size: 1.2rem;"></p>
    </div>

    <div class="container">
        <div class="header-name" id="topName"></div>
        <div class="character-box">
            <img src="https://cdn-icons-png.flaticon.com/512/6592/6592963.png" alt="Karakter">
        </div>

        <div class="dialog-box">
            <p id="messageText" style="margin: 0;"></p>
        </div>

        <div class="btn-group">
            <button class="btn" id="acceptBtn" onclick="celebrate()">Evet ❤️</button>
            <button class="btn" id="declineBtn" onclick="handleDecline()">Hayır</button>
        </div>
    </div>

    <script>
        // --- İSİM AYARI ---
        const isim = "Esra"; 

        const mesajlar = [
            `Beni affeder misin? 🥺`,
            `Hadi ama ${isim}, kıyamazsın bana... 🥺`,
            `Gerçekten çok üzgünüm, lütfen... 🙏`,
            `Sana en sevdiğin şeyi alırım! 🎁`,
            `Bak ağlıyorum şu an... 😭`,
            `Yakalarsan affedersin! 😜`
        ];

        let redSayaci = 0;
        const declineBtn = document.getElementById('declineBtn');
        const acceptBtn = document.getElementById('acceptBtn');
        const messageText = document.getElementById('messageText');
        
        // İsimleri yerleştir
        document.getElementById('topName').innerText = isim + "...";
        messageText.innerText = mesajlar[0];

        // Kalp yağmuru
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.getElementById('heartBg').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);

        function handleDecline() {
            redSayaci++;
            
            // Mesajı güncelle
            if (redSayaci < mesajlar.length) {
                messageText.innerText = mesajlar[redSayaci];
            }

            // Evet butonunu büyüt
            const currentSize = parseFloat(window.getComputedStyle(acceptBtn).fontSize);
            acceptBtn.style.fontSize = (currentSize + 2) + 'px';
            acceptBtn.style.padding = (parseFloat(window.getComputedStyle(acceptBtn).paddingTop) + 2) + 'px ' + 
                                     (parseFloat(window.getComputedStyle(acceptBtn).paddingLeft) + 5) + 'px';

            // Kaçma mekanizması (3. reddedişten sonra)
            if (redSayaci >= 3) {
                moveButton();
            }
        }

        function moveButton() {
            declineBtn.style.position = 'fixed';
            const x = Math.random() * (window.innerWidth - declineBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - declineBtn.offsetHeight - 40) + 20;
            declineBtn.style.left = x + 'px';
            declineBtn.style.top = y + 'px';
        }

        declineBtn.addEventListener('mouseover', () => { if(redSayaci >= 3) moveButton(); });
        declineBtn.addEventListener('touchstart', (e) => { 
            if(redSayaci >= 3) { e.preventDefault(); moveButton(); } 
        });

        function celebrate() {
            document.getElementById('finalTitle').innerText = "AFFEDİLDİM! 🎉";
            document.getElementById('finalMsg').innerText = `Seni çok seviyorum ${isim}, iyi ki varsın! ❤️`;
            document.getElementById('successScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
