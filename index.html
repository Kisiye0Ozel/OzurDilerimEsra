<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esra Beni Affet Lütfen... 🥺</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff0f3;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; /* Dışarı taşmaları engeller */
            touch-action: manipulation; /* Mobil gecikmeyi azaltır */
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            text-align: center;
            border: 3px solid #ffccd5;
            width: 85%;
            max-width: 320px; /* Mobilde çok yer kaplamasın */
            position: relative;
        }

        .character-box img {
            width: 140px; /* Mobilde daha ideal boyut */
            height: auto;
            margin-bottom: 15px;
        }

        .dialog-box {
            background: #fff5f7;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            color: #d63384;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1.5px solid #ffdae0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 50px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #acceptBtn {
            background: #ff4d6d;
            color: white;
            z-index: 2;
        }

        #declineBtn {
            background: #f1f3f5;
            color: #495057;
            z-index: 1;
        }

        /* Başarı Ekranı */
        #successScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .heart { font-size: 60px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div id="successScreen">
        <div class="heart">💖</div>
        <h2 style="color: #ff4d6d;">AFFEDİLDİM! 🎉</h2>
        <p style="padding: 0 20px;">Dünyanın en mutlu insanıyım!</p>
    </div>

    <div class="container">
        <div class="character-box">
            <img src="karakter.png" alt="Karakter">
        </div>

        <div class="dialog-box">
            <p id="messageText" style="margin: 0;">Aşkım beni affeder misin? 🥺</p>
        </div>

        <div class="btn-group">
            <button class="btn" id="acceptBtn" onclick="celebrate()">Evet ❤️</button>
            <button class="btn" id="declineBtn" onclick="handleDecline()">Hayır</button>
        </div>
    </div>

    <script>
        let declineCount = 0;
        const declineBtn = document.getElementById('declineBtn');
        const messageText = document.getElementById('messageText');

        function handleDecline() {
            declineCount++;

            if (declineCount === 1) {
                messageText.innerText = "Hadi ama aşkım seni çok seviyorum... 🥺";
            } 
            else if (declineCount === 2) {
                messageText.innerText = "Aşkım özür dilerim, gerçekten pişmanım... 🙏";
            } 
            else {
                messageText.innerText = "Affet beni lütfen! (Yakalayamazsın 😜)";
                declineBtn.style.position = 'fixed';
                moveButton();
            }
        }

        function moveButton() {
            // Mobilde butonun ekran dışına çıkmaması için güvenli alan
            const padding = 50;
            const x = Math.random() * (window.innerWidth - declineBtn.offsetWidth - padding) + padding/2;
            const y = Math.random() * (window.innerHeight - declineBtn.offsetHeight - padding) + padding/2;
            
            declineBtn.style.left = x + 'px';
            declineBtn.style.top = y + 'px';
        }

        // Mobilde hem tıklama hem dokunma için kaçış
        declineBtn.addEventListener('touchstart', (e) => {
            if (declineCount >= 3) {
                e.preventDefault(); // Tıklanmasını engelle
                moveButton();
            }
        });

        declineBtn.addEventListener('mouseover', () => {
            if (declineCount >= 3) moveButton();
        });

        function celebrate() {
            document.getElementById('successScreen').style.display = 'flex';
        }
    </script>
</body>
</html>a
