<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beni Affet Lütfen... 🥺</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --accent-pink: #ffccd5;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--soft-pink);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Arka Plan Kalp Animasyonu */
        .bg-hearts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.2);
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 4px solid var(--accent-pink);
            width: 85%;
            max-width: 350px;
            position: relative;
            z-index: 10;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .character-box img {
            width: 160px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .character-box img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .dialog-box {
            background: #fff5f7;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            color: #d63384;
            font-weight: 700;
            font-size: 1.1rem;
            border: 2px dashed var(--accent-pink);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            min-height: 60px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #acceptBtn {
            background: var(--primary-pink);
            color: white;
            z-index: 2;
        }

        #acceptBtn:hover {
            transform: scale(1.1);
            background: #ff3355;
        }

        #declineBtn {
            background: #e9ecef;
            color: #495057;
            z-index: 1;
            transition: all 0.2s ease; /* Kaçış hızı */
        }

        /* Başarı Ekranı */
        #successScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .heart-main { font-size: 80px; animation: beat 0.8s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            animation: confettiDrop 3s linear infinite;
        }

        @keyframes confettiDrop {
            0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-hearts" id="heartBg"></div>

    <div id="successScreen">
        <div class="heart-main">💖</div>
        <h1 style="color: var(--primary-pink); margin: 20px 0;" id="successTitle"></h1>
        <p style="font-size: 1.2rem; color: #666;" id="successMsg"></p>
    </div>

    <div class="container">
        <div class="character-box">
            <img src="https://cdn-icons-png.flaticon.com/512/6592/6592963.png" alt="Karakter">
        </div>

        <div class="dialog-box">
            <p id="messageText" style="margin: 0;"></p>
        </div>

        <div class="btn-group">
            <button class="btn" id="acceptBtn" onclick="celebrate()">Evet ❤️</button>
            <button class="btn" id="declineBtn" onclick="handleDecline()">Hayır</button>
        </div>
    </div>

    <script>
        // --- AYARLAR ---
        const kisiAdi = "Esra"; // Burayı Elif, Ayşe vb. yapabilirsin.
        
        const mesajlar = [
            `${kisiAdi} hnm, beni affeder misiniz? 🥺`,
            `Hadi ama ${kisiAdi}, seni çok seviyorum... 🥺`,
            `Gerçekten çok pişmanım ${kisiAdi}, lütfen... 🙏`,
            `Söz veriyorum bir daha olmayacak! ❤️`,
            `Affetmezsen ağlarım ama... 😭`,
            `Yakalayamazsın ki! 😜`
        ];

        let declineCount = 0;
        const declineBtn = document.getElementById('declineBtn');
        const messageText = document.getElementById('messageText');

        // Başlangıç mesajı
        messageText.innerText = mesajlar[0];

        // Arka plan kalpleri oluşturma
        function createBgHearts() {
            const bg = document.getElementById('heartBg');
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    bg.appendChild(heart);
                    
                    heart.addEventListener('animationend', () => heart.remove());
                }, i * 300);
            }
        }
        setInterval(createBgHearts, 3000);
        createBgHearts();

        function handleDecline() {
            declineCount++;
            
            // Mesajları sırayla değiştir
            if (declineCount < mesajlar.length) {
                messageText.innerText = mesajlar[declineCount];
            } else {
                messageText.innerText = mesajlar[mesajlar.length - 1];
            }

            // 3. denemeden sonra buton kaçmaya başlar
            if (declineCount >= 3) {
                moveButton();
            }

            // "Evet" butonunu her hayırda biraz büyüt (Psikolojik baskı :D)
            const acceptBtn = document.getElementById('acceptBtn');
            const currentSize = parseFloat(window.getComputedStyle(acceptBtn).fontSize);
            acceptBtn.style.padding = (12 + declineCount * 2) + 'px ' + (25 + declineCount * 4) + 'px';
            acceptBtn.style.fontSize = (currentSize + 1) + 'px';
        }

        function moveButton() {
            declineBtn.style.position = 'fixed';
            const padding = 60;
            const x = Math.random() * (window.innerWidth - declineBtn.offsetWidth - padding) + padding/2;
            const y = Math.random() * (window.innerHeight - declineBtn.offsetHeight - padding) + padding/2;
            
            declineBtn.style.left = x + 'px';
            declineBtn.style.top = y + 'px';
        }

        // Mouse ile üzerine gelince kaç (Masaüstü için)
        declineBtn.addEventListener('mouseover', () => {
            if (declineCount >= 3) moveButton();
        });

        // Dokunmatik ekranda kaç (Mobil için)
        declineBtn.addEventListener('touchstart', (e) => {
            if (declineCount >= 3) {
                e.preventDefault();
                moveButton();
            }
        });

        function celebrate() {
            const successScreen = document.getElementById('successScreen');
            document.getElementById('successTitle').innerText = `AFFEDİLDİM! 🎉`;
            document.getElementById('successMsg').innerText = `Dünyanın en mutlu insanıyım, seni çok seviyorum ${kisiAdi}!`;
            successScreen.style.display = 'flex';

            // Konfeti oluştur
            for(let i=0; i<100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#ff4d6d', '#ffccd5', '#ffb3c1', '#c9184a'][Math.floor(Math.random()*4)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
